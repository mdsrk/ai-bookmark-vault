<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow, nosnippet, noarchive" />
  <title>Login</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ccircle cx='8' cy='8' r='8' fill='%23666'/%3E%3C/svg%3E" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: #e8e8e8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 16px;
    }
    .box {
      background: #f0f0f0;
      border: 1px solid #ccc;
      padding: 24px;
      width: 100%;
      max-width: 340px;
    }
    h1 {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 18px;
      font-weight: 600;
      color: #333;
      margin: 0 0 20px 0;
      text-align: center;
    }
    label {
      font-size: 13px;
      color: #555;
      display: block;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      padding: 8px 10px;
      font-size: 14px;
      border: 1px solid #bbb;
      background: #fff;
      color: #333;
      box-sizing: border-box;
      margin-bottom: 14px;
      border-radius: 0;
    }
    input:focus {
      outline: none;
      border-color: #888;
    }
    button {
      width: 100%;
      padding: 9px;
      font-size: 14px;
      background: #888;
      color: #fff;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background: #777;
    }
    button:disabled {
      opacity: 0.6;
    }
    .error {
      background: #fdd;
      border: 1px solid #d88;
      color: #a33;
      font-size: 13px;
      padding: 8px 10px;
      margin-bottom: 14px;
      display: none;
    }
    .error.visible {
      display: block;
    }
    hr {
      border: none;
      border-top: 1px solid #ccc;
      margin: 16px 0;
    }
    .footer {
      font-size: 11px;
      color: #999;
      text-align: center;
    }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="box">
    <h1>Authentication Required</h1>

    <div id="errorMessage" class="error">
      <span id="errorText"></span>
    </div>

    <form id="loginForm">
      <label for="email">Username</label>
      <input type="text" id="email" placeholder="Username" autocomplete="username" required />

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Password" autocomplete="current-password" required />

      <button type="submit" id="loginBtn">
        <span id="btnText">Sign in</span>
        <span id="btnSpinner" class="spinner" style="display:none"></span>
      </button>
    </form>

    <hr />
    <div class="footer">Server v2.3.1</div>
  </div>

  <script>
    window.API_BASE = 'https://bookmark-vault-worker.mdshah1994.workers.dev';
  </script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    if (localStorage.getItem('vault_token')) {
      window.location.href = '/dashboard.html';
    }

    const form = document.getElementById('loginForm');
    const email = document.getElementById('email');
    const password = document.getElementById('password');
    const btn = document.getElementById('loginBtn');
    const btnText = document.getElementById('btnText');
    const btnSpinner = document.getElementById('btnSpinner');
    const errorMsg = document.getElementById('errorMessage');
    const errorText = document.getElementById('errorText');

    function showError(msg) {
      errorText.textContent = msg;
      errorMsg.classList.add('visible');
    }

    function hideError() {
      errorMsg.classList.remove('visible');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const u = email.value.trim();
      const p = password.value;

      if (!u || !p) {
        showError('Please enter both fields.');
        return;
      }

      btn.disabled = true;
      btnText.textContent = 'Signing in...';
      btnSpinner.style.display = 'inline-block';

      try {
        await login(u, p);
        window.location.href = '/dashboard.html';
      } catch (err) {
        showError(err.message || 'Invalid credentials.');
      } finally {
        btn.disabled = false;
        btnText.textContent = 'Sign in';
        btnSpinner.style.display = 'none';
      }
    });
  </script>
</body>
</html>
