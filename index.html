<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow, nosnippet, noarchive" />
  <title>welcome!! :)</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ccircle cx='8' cy='8' r='8' fill='%23999'/%3E%3C/svg%3E" />
  <style>
    body {
      background: #aaf0ff;
      font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 16px;
    }
    .box {
      background: #ff0;
      border: 4px dashed #f0f;
      padding: 30px 20px 20px 20px;
      width: 100%;
      max-width: 320px;
      box-shadow: 8px 8px 0 #000;
    }
    h1 {
      font-family: 'Comic Sans MS', cursive;
      font-size: 28px;
      color: #f00;
      text-align: center;
      margin: 0 0 5px 0;
      text-shadow: 2px 2px 0 #ff0;
      transform: rotate(-2deg);
    }
    .sub {
      text-align: center;
      font-size: 13px;
      color: #666;
      margin-bottom: 20px;
    }
    label {
      font-size: 14px;
      color: #000;
      font-weight: bold;
      display: block;
      margin-bottom: 2px;
    }
    input {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      font-family: 'Comic Sans MS', cursive;
      border: 3px solid #00f;
      background: #fff;
      color: #000;
      box-sizing: border-box;
      margin-bottom: 14px;
    }
    input:focus {
      outline: 4px solid #0f0;
      border-color: #00f;
    }
    button {
      width: 100%;
      padding: 12px;
      font-size: 18px;
      font-family: 'Comic Sans MS', cursive;
      font-weight: bold;
      background: #0f0;
      color: #000;
      border: 3px solid #000;
      cursor: pointer;
      box-shadow: 4px 4px 0 #000;
    }
    button:active {
      box-shadow: none;
      transform: translate(4px, 4px);
    }
    button:disabled {
      opacity: 0.5;
    }
    .error {
      background: #fff;
      border: 3px solid #f00;
      color: #f00;
      font-size: 13px;
      font-weight: bold;
      padding: 8px 10px;
      margin-bottom: 14px;
      display: none;
    }
    .error.visible {
      display: block;
    }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 3px solid #000;
      border-top-color: #0f0;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="box">
    <h1>✦ WELCOME ✦</h1>
    <div class="sub">plz login to see my page!!</div>

    <div id="errorMessage" class="error">
      <span id="errorText"></span>
    </div>

    <form id="loginForm">
      <label for="email">ur name:</label>
      <input type="text" id="email" placeholder="type here..." autocomplete="username" required />

      <label for="password">secret code:</label>
      <input type="password" id="password" placeholder="shhh..." autocomplete="current-password" required />

      <button type="submit" id="loginBtn">
        <span id="btnText">LOGIN!!</span>
        <span id="btnSpinner" class="spinner" style="display:none"></span>
      </button>
    </form>
  </div>

  <script>
    window.API_BASE = 'https://bookmark-vault-worker.mdshah1994.workers.dev';
  </script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    if (localStorage.getItem('vault_token')) {
      window.location.href = '/dashboard.html';
    }

    const form = document.getElementById('loginForm');
    const email = document.getElementById('email');
    const password = document.getElementById('password');
    const btn = document.getElementById('loginBtn');
    const btnText = document.getElementById('btnText');
    const btnSpinner = document.getElementById('btnSpinner');
    const errorMsg = document.getElementById('errorMessage');
    const errorText = document.getElementById('errorText');

    function showError(msg) {
      errorText.textContent = msg;
      errorMsg.classList.add('visible');
    }

    function hideError() {
      errorMsg.classList.remove('visible');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const u = email.value.trim();
      const p = password.value;

      if (!u || !p) {
        showError('hey!! fill both thingys plz');
        return;
      }

      btn.disabled = true;
      btnText.textContent = 'loading...';
      btnSpinner.style.display = 'inline-block';

      try {
        await login(u, p);
        window.location.href = '/dashboard.html';
      } catch (err) {
        showError('oopz!! wrong name or code. try again :p');
      } finally {
        btn.disabled = false;
        btnText.textContent = 'LOGIN!!';
        btnSpinner.style.display = 'none';
      }
    });
  </script>
</body>
</html>
